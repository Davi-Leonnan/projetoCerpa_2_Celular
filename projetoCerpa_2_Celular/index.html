<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="imagens/Cerpa - Logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,
    100..900;1,100..900&display=swap" rel="stylesheet">
    <title> Cerpa Portátil </title>
</head>
<body>

    <!-- Cabeçalho Inicial-->

    <header id="cabecalho_inicial"> 

        <img src="imagens/Cerpa - Logo.png" alt="Logo da Cerpa" id="logo_cerpa">

        <section id="icones_cabecalho">

            <img src="imagens/Icone de Carrinho.png" alt="Ícone de Carrinho" id="icone_carrinho">

            <img src="imagens/Três Barras.png" alt="Ícone de Menu" id="icone_menu">
        
        </section>

        

    </header>

    <!-- Conteúdo Principal -->

    <main id="conteudo_principal">

        <ul id="secao_introdutoria"> 
            <li><h1 id="texto_cerpa">A 1ª Cerveja Premium do Brasil.Tradição Amazônica desde 1966.</h1></li>
            <button id="botao_conheca_a_familia">Conheça a Família</button>
        </ul>

        <!-- Amostra de cervejas -->

        <img src="imagens/Cerpa - Balde de Cerveja.jpg" alt="Balde de cerveja" id="imagem_balde_de_cerveja">
        
        <!-- Seção das cervejas -->

        <section id="secao_das_cervejas">

             <ul id="descricao_cervejas">
                <li>
                 <h3 id="nossos_tipos_de_cerveja">Nossas Cervejas</h3>

                </li>
                <li>
                 <p id="cerveja_malte">Descubra a pureza de cada malte e a refrescância única que só a tradição 
                    amazônica oferece.
                 </p>

                </li>
            </ul>

            <!-- Tipos de Cervejas-->

            <div id="tipos_de_cerveja">
                <img src="imagens/Cerpa - Cerveja Grande.png" alt="Cerveja Grande" class="tamaho_das_cervejas">
                <img src="imagens/Cerpa - Cerveja Média.png" alt="Cerveja Média" class="tamaho_das_cervejas">
                <img src="imagens/Cerpa - Lata.png" alt="Lata de Cerveja" class="tamaho_das_cervejas">
            </div>

            <img src="imagens/pontinhos_amarelos.png" alt="pontinhos amarelos" id="pontinhos_amarelos">

        </section>


    </main>

    <!-- Rodapé -->

    <footer>
        
    </footer>
    
</body>
</html>
